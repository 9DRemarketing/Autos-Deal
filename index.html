<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autos Deal — Available Units</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1A1814;
    --muted: #7A7570;
    --accent: #1D4ED8;
    --accent-light: #EFF4FF;
    --green: #166534;
    --green-bg: #DCFCE7;
    --amber: #92400E;
    --amber-bg: #FEF3C7;
    --blue: #1E40AF;
    --blue-bg: #DBEAFE;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1200px; margin: 0 auto; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .logo em { color: var(--accent); font-style: normal; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  #unit-count { font-size: 13px; color: var(--muted); font-family: var(--mono); }
  .refresh-btn { font-size: 13px; color: var(--accent); background: var(--accent-light); border: none; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: var(--font); font-weight: 500; transition: opacity 0.15s; }
  .refresh-btn:hover { opacity: 0.8; }

  /* FILTERS */
  .filter-bar { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 0; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { font-size: 13px; font-family: var(--font); font-weight: 500; padding: 7px 16px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: #C0BAB2; color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* GRID */
  .grid-wrap { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .card-img { width: 100%; height: 180px; background: #ECEAE5; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img .no-img { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .card-img .no-img svg { opacity: 0.2; }
  .card-img .no-img span { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .pill { position: absolute; top: 12px; left: 12px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; letter-spacing: 0.3px; }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-blue  { background: var(--blue-bg);  color: var(--blue); }
  .card-body { padding: 16px 18px 18px; }
  .card-year { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 4px; }
  .card-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
  .card-vin { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 12px; }
  .specs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .spec-tag { font-size: 11px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 3px 8px; border-radius: 6px; font-weight: 500; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 14px; }
  .price { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .miles { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .view-btn { font-size: 12px; font-weight: 500; color: var(--accent); text-decoration: none; background: var(--accent-light); padding: 6px 14px; border-radius: 8px; transition: opacity 0.15s; }
  .view-btn:hover { opacity: 0.75; }

  /* STATES */
  .state-box { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; text-align: center; }
  .state-box p { color: var(--muted); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 1.5rem 2rem; display: inline-block; text-align: left; max-width: 500px; }
  .error-box p { color: #991B1B; font-size: 13px; line-height: 1.6; }
  .error-box code { font-family: var(--mono); font-size: 11px; background: #FEE2E2; padding: 2px 6px; border-radius: 4px; }

  /* EMPTY */
  .empty { padding: 3rem; color: var(--muted); font-size: 14px; }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .filter-bar, .grid-wrap { padding-left: 1rem; padding-right: 1rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Autos <em>Deal</em></div>
    <div class="header-right">
      <span id="unit-count">—</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="applyFilter('all',this)">All units</button>
  <button class="filter-btn" onclick="applyFilter('available',this)">Ready now</button>
  <button class="filter-btn" onclick="applyFilter('transit',this)">In transit</button>
  <button class="filter-btn" onclick="applyFilter('pending',this)">Pending release</button>
</div>

<div class="grid-wrap">
  <div id="content">
    <div class="state-box"><div class="spinner"></div><p>Loading inventory…</p></div>
  </div>
</div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const SHEET_ID = '12BVz72M14n3dLFMtAAaZ9BiMf5y835CVLrxtbSfz1O4';
const GID      = '542806012';
// ────────────────────────────────────────────────────────────────────────────

const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

let allTrucks = [];
let activeFilter = 'all';

function truckPlaceholder() {
  return `<div class="no-img">
    <svg width="72" height="40" viewBox="0 0 90 50" fill="none">
      <rect x="2" y="20" width="86" height="22" rx="3" fill="#1A1814"/>
      <rect x="30" y="8" width="40" height="16" rx="3" fill="#1A1814"/>
      <circle cx="18" cy="44" r="6" fill="#1A1814"/>
      <circle cx="72" cy="44" r="6" fill="#1A1814"/>
      <rect x="2" y="30" width="12" height="8" rx="1" fill="#1A1814" opacity="0.5"/>
      <rect x="76" y="24" width="10" height="8" rx="1" fill="#1A1814" opacity="0.5"/>
    </svg>
    <span>No photo</span>
  </div>`;
}

function getStatus(location) {
  if (!location) return { key: 'available', label: 'Available', cls: 'pill-green' };
  const l = location.toUpperCase();
  if (l.includes('TRANSIT')) return { key: 'transit', label: 'In transit', cls: 'pill-amber' };
  if (l.includes('RELEASE') || l.includes('APRIL') || l.includes('MAY') || l.includes('JUNE'))
    return { key: 'pending', label: location.replace(/AT FLINT\s*[-–]\s*/i,''), cls: 'pill-blue' };
  if (l.includes('FLINT') || l.includes('BOND RELEASED'))
    return { key: 'available', label: 'Ready at Flint', cls: 'pill-green' };
  return { key: 'available', label: location, cls: 'pill-green' };
}

function imgFromCell(cell) {
  if (!cell) return null;
  if (/^https?:\/\/.+\.(jpg|jpeg|png|webp|gif)/i.test(cell)) return cell;
  const m = cell.match(/\/d\/([A-Za-z0-9_-]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return null;
}

function fmtPrice(raw) {
  if (!raw) return '—';
  const n = parseInt(raw.toString().replace(/[^\d]/g,''));
  if (isNaN(n)) return raw;
  return '$' + n.toLocaleString('en-US');
}

function fmtMiles(raw) {
  if (!raw) return '';
  const n = parseInt(raw.toString().replace(/[^\d]/g,''));
  return isNaN(n) ? '' : n.toLocaleString('en-US') + ' mi';
}

function parseSpecs(notes) {
  if (!notes) return [];
  return notes.split(/[\n\\n\r]+/).map(s=>s.trim()).filter(s=>s && s.length<35).slice(0,5);
}

function cardHTML(t) {
  const st   = getStatus(t.location);
  const imgUrl = imgFromCell(t.pics);
  const specs  = parseSpecs(t.notes);
  const hasPicsLink = t.pics && /^https?:\/\//i.test(t.pics);

  const imgSection = imgUrl
    ? `<img src="${imgUrl}" alt="${t.unit}" loading="lazy" onerror="this.parentNode.innerHTML='${truckPlaceholder().replace(/'/g,"\\'")}'">`
    : truckPlaceholder();

  return `<div class="card">
    <div class="card-img">
      ${imgSection}
      <span class="pill ${st.cls}">${st.label}</span>
    </div>
    <div class="card-body">
      <div class="card-year">${t.unit ? t.unit.match(/\d{4}/) ? t.unit.match(/\d{4}/)[0] : '' : ''}</div>
      <div class="card-title">${(t.unit||'—').replace(/\s*\d{4}\s*/,'').trim()}</div>
      ${t.vin ? `<div class="card-vin">VIN ···${t.vin.slice(-8)}</div>` : ''}
      ${specs.length ? `<div class="specs">${specs.map(s=>`<span class="spec-tag">${s}</span>`).join('')}</div>` : ''}
      <div class="card-footer">
        <div>
          <div class="price">${fmtPrice(t.price)}</div>
          <div class="miles">${fmtMiles(t.miles)}</div>
        </div>
        ${hasPicsLink ? `<a class="view-btn" href="${t.pics}" target="_blank">View photos →</a>` : ''}
      </div>
    </div>
  </div>`;
}

function render(trucks) {
  const el = document.getElementById('content');
  if (!trucks.length) {
    el.innerHTML = '<div class="state-box empty"><p>No units for this filter.</p></div>';
    return;
  }
  el.innerHTML = `<div class="grid">${trucks.map(cardHTML).join('')}</div>`;
}

function applyFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const list = f === 'all' ? allTrucks : allTrucks.filter(t => getStatus(t.location).key === f);
  render(list);
}

async function loadData() {
  document.getElementById('content').innerHTML =
    '<div class="state-box"><div class="spinner"></div><p>Loading inventory…</p></div>';
  document.getElementById('unit-count').textContent = '—';

  try {
    const res  = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    const cols = json.table.cols.map(c => c.label.trim().toUpperCase());

    function idx(name) { return cols.findIndex(c => c.includes(name)); }
    const iLoc=idx('LOCATION'), iVin=idx('VIN'), iUnit=idx('UNIT'),
          iMi=idx('MILES'), iNotes=idx('NOTES'), iPics=idx('PICS'), iPrice=idx('PRICE');

    allTrucks = json.table.rows
      .map(r => ({
        location: r.c[iLoc]?.v  || '',
        vin:      r.c[iVin]?.v  || '',
        unit:     r.c[iUnit]?.v || '',
        miles:    r.c[iMi]?.v   || '',
        notes:    r.c[iNotes]?.v|| '',
        pics:     r.c[iPics]?.v || '',
        price:    r.c[iPrice]?.v|| '',
      }))
      .filter(t => t.unit && t.unit.trim());

    document.getElementById('unit-count').textContent =
      `${allTrucks.length} unit${allTrucks.length !== 1 ? 's' : ''}`;

    const filtered = activeFilter === 'all'
      ? allTrucks
      : allTrucks.filter(t => getStatus(t.location).key === activeFilter);
    render(filtered);

  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="state-box">
        <div class="error-box">
          <p><strong>Could not load inventory.</strong><br><br>
          Make sure the Google Sheet is shared publicly:<br>
          <em>Share → Anyone with the link → Viewer</em><br><br>
          Error: <code>${e.message}</code></p>
        </div>
      </div>`;
    document.getElementById('unit-count').textContent = 'Error';
  }
}

loadData();
</script>
</body>
</html>
