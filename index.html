<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Autos Deal — Available Units</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EF; --surface: #FFFFFF; --border: #E2DDD6;
    --text: #1A1814; --muted: #7A7570; --accent: #1D4ED8; --accent-light: #EFF4FF;
    --green: #166534; --green-bg: #DCFCE7;
    --amber: #92400E; --amber-bg: #FEF3C7;
    --blue: #1E40AF; --blue-bg: #DBEAFE;
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    --header-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1rem; position: sticky; top: 0; z-index: 100; height: var(--header-h); display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
  .logo em { color: var(--accent); font-style: normal; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  #unit-count { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .refresh-btn { font-size: 13px; color: var(--accent); background: var(--accent-light); border: none; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-family: var(--font); font-weight: 500; min-height: 36px; }

  .filter-wrap { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: var(--header-h); z-index: 99; }
  .filter-bar { display: flex; justify-content: center; gap: 8px; padding: 10px 1rem; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { font-size: 13px; font-family: var(--font); font-weight: 500; padding: 7px 16px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; min-height: 36px; transition: all 0.15s; }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .grid-wrap { padding: 1rem; max-width: 1200px; margin: 0 auto; padding-bottom: 3rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; -webkit-user-select: none; user-select: none; }
  .card:active { transform: scale(0.98); }
  @media (hover: hover) { .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); } }
  .card-img { width: 100%; height: 190px; background: #ECEAE5; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .no-img { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .no-img svg { opacity: 0.2; }
  .no-img span { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .pill { position: absolute; top: 10px; left: 10px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; letter-spacing: 0.3px; }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-blue  { background: var(--blue-bg);  color: var(--blue); }
  .pill-red   { background: #FEE2E2; color: #991B1B; }
  .card-body { padding: 14px 16px 16px; }
  .card-header { display: flex; align-items: baseline; gap: 7px; margin-bottom: 3px; }
  .card-year  { font-size: 13px; font-family: var(--mono); color: var(--muted); }
  .card-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .card-vin   { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 10px; margin-top: 2px; }
  .specs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .spec-tag { font-size: 11px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 3px 8px; border-radius: 6px; font-weight: 500; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 11px; }
  .price { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .miles { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .arrow { font-size: 18px; color: var(--muted); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; border-radius: 20px 20px 0 0; animation: slideUp 0.22s ease; position: relative; }
  @media (min-width: 660px) { .overlay { align-items: center; padding: 1rem; } .modal { border-radius: 20px; max-height: 88vh; animation: popIn 0.18s ease; } }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes popIn   { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
  @media (min-width: 660px) { .modal-handle { display: none; } }
  .modal-img { width: 100%; height: 380px; background: #ECEAE5; position: relative; overflow: hidden; }
  @media (min-width: 660px) { .modal-img { border-radius: 20px 20px 0 0; } }
  .car-track { position: absolute; inset: 0; }
  .car-track img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.28s ease; pointer-events: none; }
  .car-track img.active { opacity: 1; pointer-events: auto; }
  .car-no-photo { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .car-no-photo span { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .close-btn { position: absolute; top: 12px; right: 12px; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.45); border: none; cursor: pointer; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; }
  .car-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; border-radius: 50%; background: rgba(0,0,0,0.42); border: none; color: #fff; font-size: 22px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .car-arrow:hover { background: rgba(0,0,0,0.65); }
  .car-arrow.hidden { display: none; }
  .car-prev { left: 10px; }
  .car-next { right: 10px; }
  .car-bottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 14px; background: linear-gradient(transparent, rgba(0,0,0,0.45)); display: flex; align-items: center; justify-content: space-between; z-index: 9; }
  .car-dots { display: flex; gap: 5px; flex-wrap: wrap; max-width: 70%; }
  .car-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.45); border: none; cursor: pointer; padding: 0; transition: all 0.15s; flex-shrink: 0; }
  .car-dot.active { background: #fff; transform: scale(1.3); }
  .car-counter { font-size: 12px; color: rgba(255,255,255,0.85); font-family: var(--mono); white-space: nowrap; }
  .modal-body { padding: 20px 20px 40px; }
  @media (min-width: 480px) { .modal-body { padding: 24px 28px 36px; } }
  .modal-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .modal-year  { font-size: 14px; font-family: var(--mono); color: var(--muted); }
  .modal-miles { font-size: 13px; font-family: var(--mono); color: var(--muted); margin-bottom: 6px; }
  .modal-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .modal-price { font-size: 30px; font-weight: 700; letter-spacing: -1px; margin: 12px 0 20px; }

  .vin-block { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; }
  .vin-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .vin-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .vin-value { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); user-select: all; cursor: text; letter-spacing: 1.5px; word-break: break-all; flex: 1; }
  .vin-copy { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600; font-family: var(--font); color: var(--accent); cursor: pointer; white-space: nowrap; min-height: 36px; }
  .vin-copy.copied { color: var(--green); border-color: var(--green-bg); background: var(--green-bg); }
  .vin-hint { font-size: 11px; color: var(--muted); margin-top: 7px; }
  .modal-specs { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 22px; }
  .modal-spec { font-size: 13px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 8px; font-weight: 500; }
  .modal-actions { display: flex; flex-direction: column; gap: 10px; }
  @media (min-width: 400px) { .modal-actions { flex-direction: row; flex-wrap: wrap; } }
  .btn-primary { flex: 1; background: var(--text); color: #fff; border: none; padding: 15px 16px; border-radius: 12px; font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer; text-align: center; text-decoration: none; display: block; min-height: 50px; line-height: 1.2; }
  .btn-primary:active { opacity: 0.8; }
  .btn-secondary { flex: 1; background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 15px 16px; border-radius: 12px; font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer; text-align: center; text-decoration: none; display: block; min-height: 50px; line-height: 1.2; }
  .btn-secondary:active { background: var(--bg); }
  .btn-disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  .state-box { padding: 4rem 1.5rem; text-align: center; }
  .state-box p { color: var(--muted); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 1.25rem; display: inline-block; text-align: left; max-width: 420px; }
  .error-box p { color: #991B1B; font-size: 13px; line-height: 1.6; }
  .error-box code { font-family: var(--mono); font-size: 11px; background: #FEE2E2; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Autos <em>Deal</em></div>
    <a href="https://www.autosdeal.ca" target="_blank" style="font-size:11px;color:var(--muted);font-family:var(--mono);text-decoration:none;">www.autosdeal.ca</a>
  </div>
  <div class="header-right">
    <span id="unit-count">—</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div class="filter-wrap">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="applyFilter('all',this)">All units</button>
    <button class="filter-btn" onclick="applyFilter('available',this)">Ready now</button>
    <button class="filter-btn" onclick="applyFilter('transit',this)">In transit</button>
    <button class="filter-btn" onclick="applyFilter('pending',this)">Pending release</button>
  </div>
</div>

<div class="grid-wrap">
  <div id="content">
    <div class="state-box"><div class="spinner"></div><p>Loading inventory…</p></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-img" id="modal-img">
      <div class="car-track" id="car-track"></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
      <button class="car-arrow car-prev hidden" id="car-prev" onclick="carMove(-1)">‹</button>
      <button class="car-arrow car-next hidden" id="car-next" onclick="carMove(1)">›</button>
      <div class="car-bottom" id="car-bottom" style="display:none">
        <div class="car-dots" id="car-dots"></div>
        <div class="car-counter" id="car-counter"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-head">
        <span class="modal-year" id="modal-year"></span>
        <span class="modal-title" id="modal-title"></span>
      </div>
      <div class="modal-miles" id="modal-miles"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="vin-block">
        <div class="vin-label">VIN Number</div>
        <div class="vin-row">
          <div class="vin-value" id="modal-vin"></div>
          <button class="vin-copy" id="vin-copy-btn" onclick="copyVin()">Copy</button>
        </div>
        <div class="vin-hint">Tap Copy</div>
      </div>
      <div class="modal-specs" id="modal-specs"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1-Utq6kvfvgdoOqLZZkzPRwBjg7WSYq_Yh7z25u2ReJA';
const GID      = '1875400806';
const API_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

let allTrucks = [];
let activeFilter = 'all';

function noImgHTML() {
  return `<div class="no-img"><svg width="64" height="36" viewBox="0 0 90 50" fill="none"><rect x="2" y="20" width="86" height="22" rx="3" fill="#1A1814"/><rect x="30" y="8" width="40" height="16" rx="3" fill="#1A1814"/><circle cx="18" cy="44" r="6" fill="#1A1814"/><circle cx="72" cy="44" r="6" fill="#1A1814"/><rect x="2" y="30" width="12" height="8" rx="1" fill="#1A1814" opacity="0.5"/><rect x="76" y="24" width="10" height="8" rx="1" fill="#1A1814" opacity="0.5"/></svg><span>No photo</span></div>`;
}

// Reads STATUT column directly
function getStatus(statut, location) {
  if (!statut) return { key:'available', label:'Available', cls:'pill-green' };
  const label = location ? `${statut} - ${location}` : statut;
  const s = statut.toUpperCase().trim();
  if (s.startsWith('SOLD'))                                     return { key:'sold',      label:'SOLD',  cls:'pill-red'   };
  if (s.startsWith('READY') || s.startsWith('BOND RELEASED')) return { key:'available', label, cls:'pill-green' };
  if (s.startsWith('IN TRANSIT'))                              return { key:'transit',   label, cls:'pill-amber' };
  return { key:'pending', label, cls:'pill-blue' };
}

const CLOUD_NAME = 'diqjtg1m8';

function imgUrl(cell) {
  if (!cell) return null;
  if (cell.includes('res.cloudinary.com')) {
    return cell.includes('q_auto') ? cell : cell.replace('/upload/', '/upload/w_1200,q_auto,f_auto/');
  }
  if (/^https?:\/\/.+\.(jpg|jpeg|png|webp|gif)/i.test(cell)) return cell;
  const m = cell.match(/\/d\/([A-Za-z0-9_-]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return null;
}

// Fetch all photos tagged with VIN from Cloudinary
async function fetchCloudinaryPhotos(vin) {
  if (!vin) return [];
  try {
    const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${vin}.json`);
    if (!res.ok) return [];
    const data = await res.json();
    return (data.resources || []).map(r =>
      `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_1200,q_auto,f_auto/${r.public_id}.${r.format}`
    );
  } catch { return []; }
}

// Fallback: parse comma-separated URLs from PICS column
function parsePicsFallback(picsCell, primePic) {
  const urls = [], seen = new Set();
  const add = (u) => { const r = imgUrl(u && u.trim()); if (r && !seen.has(r)) { seen.add(r); urls.push(r); } };
  if (primePic) add(primePic);
  if (picsCell) picsCell.split(',').forEach(add);
  return urls;
}

// ── Carousel ────────────────────────────────────────────────────
let carPhotos = [], carIdx = 0;
let touchStartX = 0, touchStartY = 0;

function carInit(photos) {
  carPhotos = photos;
  carIdx = 0;
  const track = document.getElementById('car-track');
  const dotsEl = document.getElementById('car-dots');
  const bottom = document.getElementById('car-bottom');

  if (!photos.length) {
    track.innerHTML = `<div class="car-no-photo"><svg width="64" height="36" viewBox="0 0 90 50" fill="none"><rect x="2" y="20" width="86" height="22" rx="3" fill="#1A1814"/><rect x="30" y="8" width="40" height="16" rx="3" fill="#1A1814"/><circle cx="18" cy="44" r="6" fill="#1A1814"/><circle cx="72" cy="44" r="6" fill="#1A1814"/></svg><span>No photo</span></div>`;
    dotsEl.innerHTML = '';
    bottom.style.display = 'none';
    document.getElementById('car-prev').classList.add('hidden');
    document.getElementById('car-next').classList.add('hidden');
    return;
  }

  // Build slides (lazy: set src only when near)
  track.innerHTML = photos.map((url, i) =>
    `<img id="cimg${i}" src="${i === 0 ? url : ''}" data-src="${url}" alt="" class="${i===0?'active':''}" loading="lazy">`
  ).join('');

  // Dots (max 20 visible)
  if (photos.length > 1) {
    dotsEl.innerHTML = photos.map((_,i) =>
      `<button class="car-dot${i===0?' active':''}" onclick="carGoto(${i})"></button>`
    ).join('');
    bottom.style.display = 'flex';
  } else {
    dotsEl.innerHTML = '';
    bottom.style.display = 'none';
  }

  carUpdateUI();

  // Touch swipe
  const imgEl = document.getElementById('modal-img');
  imgEl.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  imgEl.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) carMove(dx < 0 ? 1 : -1);
  }, { passive: true });
}

function carPreload(i) {
  if (i < 0 || i >= carPhotos.length) return;
  const el = document.getElementById(`cimg${i}`);
  if (el && !el.src) el.src = el.dataset.src;
}

function carGoto(i) {
  if (i < 0 || i >= carPhotos.length) return;
  const prev = carIdx;
  carIdx = i;
  // Activate new slide
  const imgs = document.querySelectorAll('#car-track img');
  imgs.forEach((el, idx) => el.classList.toggle('active', idx === carIdx));
  // Ensure src loaded
  const cur = document.getElementById(`cimg${carIdx}`);
  if (cur && !cur.src) cur.src = cur.dataset.src;
  // Preload neighbours
  carPreload(carIdx - 1);
  carPreload(carIdx + 1);
  carUpdateUI();
}

function carMove(dir) { carGoto(carIdx + dir); }

function carUpdateUI() {
  const n = carPhotos.length;
  // Arrows
  document.getElementById('car-prev').classList.toggle('hidden', n <= 1 || carIdx === 0);
  document.getElementById('car-next').classList.toggle('hidden', n <= 1 || carIdx === n - 1);
  // Dots
  document.querySelectorAll('.car-dot').forEach((d, i) => d.classList.toggle('active', i === carIdx));
  // Counter
  if (n > 1) document.getElementById('car-counter').textContent = `${carIdx + 1} / ${n}`;
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (!document.getElementById('overlay').classList.contains('open')) return;
  if (e.key === 'Escape')     closeModal();
  if (e.key === 'ArrowLeft')  carMove(-1);
  if (e.key === 'ArrowRight') carMove(1);
});

function fmtPrice(r) {
  if (!r) return '—';
  const s = r.toString();
  if (s.toUpperCase().includes('SOLD')) return '';
  const n = parseInt(s.replace(/[^\d]/g,''));
  return isNaN(n) ? s : '$' + n.toLocaleString('en-US');
}

function fmtMiles(r) {
  if (!r) return '';
  const n = parseInt(r.toString().replace(/[^\d]/g,''));
  return isNaN(n) ? '' : n.toLocaleString('en-US') + ' mi';
}

function parseSpecs(notes) {
  if (!notes) return [];
  return notes.split(/[\n\\n\r]+/).map(s=>s.trim()).filter(s=>s&&s.length<35).slice(0,6);
}

function cardHTML(t, i) {
  const st = getStatus(t.statut, t.location);
  const im = imgUrl(t.primePic);
  const sp = parseSpecs(t.notes);
  const imgPart = im
    ? `<img src="${im}" alt="" loading="lazy" onerror="this.parentNode.innerHTML=noImgHTML()">`
    : noImgHTML();
  const soldOverlay = String(t.statut || '').toUpperCase().startsWith('SOLD') ? `<div style="position:absolute;inset:0;background:rgba(153,27,27,0.65);display:flex;align-items:center;justify-content:center;"><div style="transform:rotate(-20deg);background:#B91C1C;color:#fff;font-size:32px;font-weight:800;letter-spacing:6px;padding:10px 40px;border-top:4px solid #fff;border-bottom:4px solid #fff;text-align:center;">SOLD</div></div>` : '';
  return `<div class="card" onclick="openModal(${i})">
    <div class="card-img">${imgPart}${soldOverlay}<span class="pill ${st.cls}">${st.label}</span></div>
    <div class="card-body">
      <div class="card-header">
        <span class="card-year">${t.year||''}</span>
        <span class="card-title">${t.unit||'—'}</span>
      </div>
      ${t.vin ? `<div class="card-vin">VIN ···${t.vin.slice(-8)}</div>` : ''}
      ${sp.length ? `<div class="specs">${sp.map(s=>`<span class="spec-tag">${s}</span>`).join('')}</div>` : ''}
      <div class="card-footer">
        <div>
          <div class="price">${fmtPrice(t.price)}</div>
          <div class="miles">${fmtMiles(t.miles)}</div>
        </div>
        <span class="arrow">›</span>
      </div>
    </div>
  </div>`;
}

async function openModal(i) {
  const t  = allTrucks[i];
  const st = getStatus(t.statut, t.location);
  const sp = parseSpecs(t.notes);

  // Show modal immediately with spinner while photos load
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => { document.getElementById('modal').scrollTop = 0; }, 10);

  // Init carousel with spinner
  const track = document.getElementById('car-track');
  track.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>';
  document.getElementById('car-dots').innerHTML = '';
  document.getElementById('car-bottom').style.display = 'none';
  document.getElementById('car-prev').classList.add('hidden');
  document.getElementById('car-next').classList.add('hidden');

  // Fetch photos: try Cloudinary tag (VIN) first, fallback to PICS column
  let photos = await fetchCloudinaryPhotos(t.vin);
  if (!photos.length) photos = parsePicsFallback(t.pics, t.primePic);
  carInit(photos);

  const imgEl = document.getElementById('modal-img');
  document.getElementById('car-track').querySelectorAll('.sold-overlay').forEach(e => e.remove());
  if (String(t.statut || '').toUpperCase().startsWith('SOLD')) {
    const ov = document.createElement('div');
    ov.className = 'sold-overlay';
    ov.style.cssText = 'position:absolute;inset:0;background:rgba(153,27,27,0.65);display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none;';
    ov.innerHTML = '<div style="transform:rotate(-20deg);background:#B91C1C;color:#fff;font-size:32px;font-weight:800;letter-spacing:6px;padding:10px 40px;border-top:4px solid #fff;border-bottom:4px solid #fff;">SOLD</div>';
    imgEl.appendChild(ov);
  }

  // Status pill
  let pill = imgEl.querySelector('.modal-status-pill');
  if (!pill) { pill = document.createElement('span'); pill.className = 'pill modal-status-pill'; pill.style.cssText = 'position:absolute;top:12px;left:12px;z-index:6;'; imgEl.appendChild(pill); }
  pill.className = `pill ${st.cls} modal-status-pill`;
  pill.style.cssText = 'position:absolute;top:12px;left:12px;z-index:6;';
  pill.textContent = st.label;

  document.getElementById('modal-year').textContent  = t.year || '';
  document.getElementById('modal-title').textContent = t.unit || '—';
  document.getElementById('modal-miles').textContent = fmtMiles(t.miles);
  document.getElementById('modal-price').textContent = fmtPrice(t.price);
  document.getElementById('modal-vin').textContent   = t.vin || '—';

  const copyBtn = document.getElementById('vin-copy-btn');
  copyBtn.textContent = 'Copy';
  copyBtn.className = 'vin-copy';
  copyBtn._vin = t.vin || '';

  document.getElementById('modal-specs').innerHTML =
    sp.map(s=>`<span class="modal-spec">${s}</span>`).join('');

  const carfaxNote = t.vin
    ? `<p style="font-size:12px;color:var(--muted);margin-top:12px;font-family:var(--font);">Please verify Carfax before purchase.</p>`
    : '';

  // If PICS is an external link (Google Photos, etc.) and not used in carousel → show button
  const picsIsExternalLink = t.pics && /^https?:\/\//i.test(t.pics) && !photos.some(p => p === imgUrl(t.pics));
  const picsBtn = picsIsExternalLink
    ? `<a class="btn-primary" href="${t.pics}" target="_blank">📷 View all photos</a>`
    : '';

  document.getElementById('modal-actions').innerHTML = picsBtn + carfaxNote;
}

function copyVin() {
  const btn = document.getElementById('vin-copy-btn');
  const vin = btn._vin;
  if (!vin || vin === '—') return;
  navigator.clipboard.writeText(vin).then(() => {
    btn.textContent = '✓ Copied';
    btn.className = 'vin-copy copied';
    setTimeout(() => { btn.textContent = 'Copy'; btn.className = 'vin-copy'; }, 2000);
  }).catch(() => {
    const el = document.getElementById('modal-vin');
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}

function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }

function render(list) {
  const el = document.getElementById('content');
  if (!list.length) { el.innerHTML = '<div class="state-box"><p>No units for this filter.</p></div>'; return; }
  el.innerHTML = `<div class="grid">${list.map(t=>cardHTML(t, allTrucks.indexOf(t))).join('')}</div>`;
}

function applyFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(f==='all' ? allTrucks : allTrucks.filter(t=>getStatus(t.statut, t.location).key===f));
}

async function loadData() {
  document.getElementById('content').innerHTML =
    '<div class="state-box"><div class="spinner"></div><p>Loading inventory…</p></div>';
  document.getElementById('unit-count').textContent = '—';
  try {
    const text = await (await fetch(API_URL)).text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    const cols = json.table.cols.map(c => c.label.trim().toUpperCase());
    const fi   = n => cols.findIndex(c => c.includes(n));

    const iSt=fi('STATUT'), iL=fi('LOCATION'), iV=fi('VIN'), iU=fi('UNIT'), iY=fi('YEAR'),
          iM=fi('MILES'), iN=fi('NOTES'), iPP=fi('PRIME'), iP=fi('PICS'), iPr=fi('PRICE');

    allTrucks = json.table.rows
      .map(r => ({
        statut:   r.c[iSt]?.v  || '',
        location: r.c[iL]?.v   || '',
        vin:      r.c[iV]?.v   || '',
        unit:     r.c[iU]?.v   || '',
        year:     r.c[iY]?.v   ? String(r.c[iY].v) : '',
        miles:    r.c[iM]?.v   || '',
        notes:    r.c[iN]?.v   || '',
        primePic: r.c[iPP]?.v  || '',
        pics:     r.c[iP]?.v   || '',
        price:    r.c[iPr]?.v  || '',
      }))
      .filter(t => t.unit && t.unit.trim());

    document.getElementById('unit-count').textContent =
      `${allTrucks.length} unit${allTrucks.length!==1?'s':''}`;

    render(activeFilter==='all'
      ? allTrucks
      : allTrucks.filter(t=>getStatus(t.statut, t.location).key===activeFilter));

  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="state-box"><div class="error-box"><p><strong>Could not load inventory.</strong><br><br>
      Make sure the Google Sheet is shared publicly.<br><br>Error: <code>${e.message}</code></p></div></div>`;
    document.getElementById('unit-count').textContent = 'Error';
  }
}

loadData();
</script>
